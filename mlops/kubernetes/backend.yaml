apiVersion: apps/v1
kind: Deployment
metadata:
  name: iex-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iex-backend
  template:
    metadata:
      labels:
        app: iex-backend
    spec:
      containers:
        - name: backend
          image: iex-power-trading-backend:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: iex-backend
spec:
  selector:
    app: iex-backend
  ports:
    - port: 8000
      targetPort: 8000
