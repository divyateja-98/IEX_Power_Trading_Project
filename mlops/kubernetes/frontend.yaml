apiVersion: apps/v1
kind: Deployment
metadata:
  name: iex-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iex-frontend
  template:
    metadata:
      labels:
        app: iex-frontend
    spec:
      containers:
        - name: frontend
          image: iex-power-trading-frontend:latest
          ports:
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: iex-frontend
spec:
  selector:
    app: iex-frontend
  ports:
    - port: 8501
      targetPort: 8501
