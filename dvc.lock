      hash: md5
      md5: 0b313afff18c0faf1d2f34eb187f8f30
      size: 6962
    params:
      params.yaml:
        merge.keys:
        - Date
        - Hour
        paths.master_dataset: data/processed/master_dataset.csv
        paths.merge_report: reports/merge_report.txt
        paths.raw_data_dir: data/raw
    outs:
    - path: data/processed/master_dataset.csv
      hash: md5
