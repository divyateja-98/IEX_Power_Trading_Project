    params:
      params.yaml:
        feature_engineering.lags: 1,2,24,48
        feature_engineering.rolling_windows: 24
        paths.cleaned_dataset: data/processed/cleaned_dataset.csv
        paths.engineered_dataset: data/processed/engineered_dataset.csv
        paths.feature_engineering_report: reports/feature_engineering_report.txt
