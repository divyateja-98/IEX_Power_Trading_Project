      size: 1466
  train:
    cmd: python xgboost_pipeline.py --input-path 
      data/processed/engineered_dataset.csv --model-path 
      models/xgboost_model.pkl --report-path reports/xgboost_model_report.txt 
      --plot-dir reports/modeling --test-size 0.2 --random-state 42 
      --n-estimators 500 --learning-rate 0.04 --max-depth 5 --subsample 0.85 
      --colsample-bytree 0.85 --eval-metric rmse
    deps:
    - path: data/processed/engineered_dataset.csv
      hash: md5
      md5: 58b332e28b7a6b8ffdaed00703969775
