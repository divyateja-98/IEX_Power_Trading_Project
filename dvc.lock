        paths.raw_market_data: data/raw/IEX_combined.xlsx
        paths.raw_weather_data: data/raw/IEX_weather.xlsx
    outs:
    - path: reports/data_summary.txt
      hash: md5
      md5: 68853d30ac181296fcb3df6540810285
      size: 11662
  merge:
    cmd: python merge_data.py --data-dir data/raw --output-path 
      data/processed/master_dataset.csv --report-path reports/merge_report.txt
    deps:
    - path: data/raw/IEX_combined.xlsx
