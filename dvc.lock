      size: 2685
    - path: xgboost_pipeline.py
      hash: md5
      md5: a3985a3dcbd853599412e6f95a716b42
      size: 19635
    params:
      params.yaml:
        paths.engineered_dataset: data/processed/engineered_dataset.csv
        paths.model: models/xgboost_model.pkl
        paths.modeling_plot_dir: reports/modeling
        paths.training_report: reports/xgboost_model_report.txt
        train:
          test_size: 0.2
          random_state: 42
          model_type: xgboost_regressor
          objective: reg:squarederror
          n_estimators: 500
          learning_rate: 0.04
          max_depth: 5
          subsample: 0.85
          colsample_bytree: 0.85
          eval_metric: rmse
    outs:
    - path: models/xgboost_model.pkl
      hash: md5
      md5: bd254f02993310df95fd40017bca89bf
      size: 1349818
    - path: reports/modeling
