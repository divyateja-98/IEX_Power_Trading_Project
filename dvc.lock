      size: 17479
  feature_engineering:
    cmd: python feature_engineering.py --input-path 
      data/processed/cleaned_dataset.csv --output-path 
      data/processed/engineered_dataset.csv --report-path 
      reports/feature_engineering_report.txt --lags 1,2,24,48 --rolling-windows 
      24
    deps:
    - path: data/processed/cleaned_dataset.csv
      hash: md5
      md5: 2192af8bb123c2943a465d988d595257
      size: 11045331
    - path: feature_engineering.py
      hash: md5
      md5: ecba82d1d42c923af6bb3eb0005639df
