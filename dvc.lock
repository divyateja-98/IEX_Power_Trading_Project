      hash: md5
      md5: 201d3d8edaf4ca63fbd40d5b956503ba
      size: 3331
  clean:
    cmd: python clean_data.py --input-path data/processed/master_dataset.csv 
      --output-path data/processed/cleaned_dataset.csv --report-path 
      reports/cleaning_report.txt
    deps:
    - path: clean_data.py
      hash: md5
      md5: 0d9ffa91bccda7ad84c282a4364cc05e
