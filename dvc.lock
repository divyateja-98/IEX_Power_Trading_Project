    - path: validation_reports/validation_result.json
      hash: md5
      md5: 51125c0bc704619c3178cc5fe59effcd
      size: 30929
    params:
      params.yaml:
        clean.missing_value_strategy: forward_fill_then_numeric_median
        clean.outlier_method: iqr
        paths.cleaned_dataset: data/processed/cleaned_dataset.csv
        paths.cleaning_report: reports/cleaning_report.txt
        paths.master_dataset: data/processed/master_dataset.csv
    outs:
    - path: data/processed/cleaned_dataset.csv
      hash: md5
      md5: 2192af8bb123c2943a465d988d595257
