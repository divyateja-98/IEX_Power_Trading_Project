services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: iex-fastapi
    environment:
      MLFLOW_TRACKING_URI: sqlite:////app/mlflow.db
      LOG_LEVEL: INFO
      OPENLINEAGE_URL: http://marquez:5000/api/v1/lineage
      OPENLINEAGE_NAMESPACE: iex-power-trading
    ports:
      - "8002:8002"
    volumes:
      - ./mlflow.db:/app/mlflow.db
      - ./mlruns:/app/mlruns
      - ./models:/app/models
      - ./reports:/app/reports
      - ./data:/app/data:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    networks:
      - iex-network

  marquez:
    image: marquezproject/marquez:latest
    container_name: iex-marquez
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      SEARCH_ENABLED: "false"
    ports:
      - "5001:5000"
      - "5002:5001"
    volumes:
      - marquez-data:/opt/marquez
    depends_on:
      - marquez-db
    restart: unless-stopped
    networks:
      - iex-network

  marquez-db:
    image: postgres:14
    container_name: iex-marquez-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      MARQUEZ_DB: marquez
      MARQUEZ_USER: marquez
      MARQUEZ_PASSWORD: marquez
    ports:
      - "5433:5432"
    volumes:
      - marquez-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - iex-network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: iex-streamlit
    environment:
      FASTAPI_PREDICT_URL: http://fastapi:8002/predict
    ports:
      - "8501:8501"
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    networks:
      - iex-network

  react-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_FASTAPI_BASE_URL: http://127.0.0.1:8002
    container_name: iex-react-frontend
    ports:
      - "8080:8080"
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - iex-network

  mlflow:
    image: python:3.12-slim
    container_name: iex-mlflow
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir 'mlflow>=3.0,<4.0' &&
      mlflow server
      --backend-store-uri sqlite:////app/mlflow.db
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/app/mlflow.db
      - ./mlruns:/app/mlruns
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - iex-network

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: iex-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - iex-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: iex-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    networks:
      - iex-network

networks:
  iex-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  marquez-data:
  marquez-db-data:
